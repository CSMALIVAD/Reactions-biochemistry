<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champak's Virtual Laboratory</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, Arial;
    background:#eef3f9;
}

header{
    background:#001f4d;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:600;
}

.container{
    display:flex;
    flex-wrap:wrap;
    min-height:100vh;
}

.sidebar{
    width:260px;
    background:white;
    padding:20px;
    border-right:2px solid #ddd;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:8px;
    border:none;
    background:#dbe7ff;
    font-weight:600;
    border-radius:6px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#bcd3ff;
}

.main{
    flex:1;
    padding:20px;
    text-align:center;
}

.beaker{
    width:220px;
    height:320px;
    margin:20px auto;
    border:5px solid #333;
    border-radius:0 0 60px 60px;
    position:relative;
    overflow:hidden;
    background:white;
}

.liquid{
    position:absolute;
    bottom:0;
    width:100%;
    height:70%;
    background:#ff4d6d;
    transition:background 0.5s;
}

/* Molecules INSIDE beaker */
.molecule{
    position:absolute;
    color:white;
    font-weight:bold;
    font-size:14px;
    animation:float 3s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.spectro{
    margin-top:25px;
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:left;
}

.meter{
    font-size:22px;
    font-weight:bold;
    color:#003366;
}

@media(max-width:768px){
    .container{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
        border-right:none;
        border-bottom:2px solid #ddd;
    }
}

</style>
</head>

<body>

<header>
Champak's Virtual Laboratory
</header>

<div class="container">

<div class="sidebar">
<button onclick="selectTest('glucose')">Glucose (GOD-POD)</button>
<button onclick="selectTest('urea')">Urea (Urease)</button>
<button onclick="selectTest('bilirubin')">Bilirubin</button>
</div>

<div class="main">

<div class="beaker" id="beaker">
<div class="liquid" id="liquid"></div>
</div>

<div class="spectro">
<h3>Spectrophotometer Simulation</h3>
<p><b>Wavelength:</b> <span id="wavelength">505</span> nm</p>
<p class="meter">Absorbance (A): <span id="absorbance">0.500</span></p>
<p><b>Beer–Lambert Law:</b> A = ε × c × l</p>
</div>

</div>
</div>

<script>

let epsilon=0.005;

function clearMolecules(){
    const beaker=document.getElementById("beaker");
    beaker.innerHTML='<div class="liquid" id="liquid"></div>';
}

function addMolecule(text,left,top){
    let m=document.createElement("div");
    m.className="molecule";
    m.style.left=left+"%";
    m.style.top=top+"%";
    m.innerText=text;
    document.getElementById("beaker").appendChild(m);
}

function selectTest(type){

    clearMolecules();

    const liquid=document.getElementById("liquid");

    if(type==="glucose"){
        epsilon=0.005;
        liquid.style.background="#ff4d6d";
        document.getElementById("wavelength").innerText="505";
        addMolecule("Glucose",30,70);
        addMolecule("O₂",60,75);
        addMolecule("Quinoneimine",35,40);
    }

    if(type==="urea"){
        epsilon=0.003;
        liquid.style.background="#4da6ff";
        document.getElementById("wavelength").innerText="578";
        addMolecule("Urea",40,70);
        addMolecule("CO₂",50,40);
    }

    if(type==="bilirubin"){
        epsilon=0.004;
        liquid.style.background="#ffcc00";
        document.getElementById("wavelength").innerText="546";
        addMolecule("Bilirubin",35,70);
        addMolecule("Azobilirubin",30,40);
    }

    document.getElementById("absorbance").innerText=(epsilon*100).toFixed(3);
}

selectTest("glucose");

</script>

</body>
</html>
