<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Biochemistry Reaction Lab</title>

<style>

body{
    margin:0;
    font-family: "Segoe UI", Arial;
    background:#f4f7fb;
}

/* HEADER */
header{
    background:#002b5c;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:600;
}

/* MAIN LAYOUT */
.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:280px;
    background:white;
    padding:20px;
    border-right:2px solid #ddd;
    box-shadow:2px 0 5px rgba(0,0,0,0.05);
}

.sidebar h3{
    margin-top:0;
}

.sidebar button{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    background:#e6efff;
    font-weight:600;
    cursor:pointer;
    border-radius:6px;
    transition:0.3s;
}

.sidebar button:hover{
    background:#c8dcff;
}

/* MAIN AREA */
.main{
    flex:1;
    padding:20px;
    text-align:center;
}

/* BEAKER */
.beaker{
    width:200px;
    height:300px;
    margin:20px auto;
    border:5px solid #444;
    border-radius:0 0 60px 60px;
    position:relative;
    overflow:hidden;
    background:rgba(255,255,255,0.9);
}

.liquid{
    position:absolute;
    bottom:0;
    width:100%;
    height:0%;
    background:transparent;
    transition: height 2s, background 2s;
}

/* MOLECULE */
.molecule{
    position:absolute;
    font-size:14px;
    font-weight:bold;
    animation: float 3s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-15px);}
    100%{transform:translateY(0px);}
}

/* INFO CARD */
.info{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    text-align:left;
    margin-top:20px;
}

/* MOBILE VIEW */
@media(max-width:768px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
    border-right:none;
    border-bottom:2px solid #ddd;
}

.sidebar button{
    font-size:16px;
}

.beaker{
    width:160px;
    height:240px;
}

}

</style>
</head>

<body>

<header>
Biochemistry Reaction Simulation Lab  
GMC Surat STEM Portal
</header>

<div class="container">

<div class="sidebar">
<h3>Biochemical Parameters</h3>

<button onclick="runReaction('glucose')">Glucose (GOD-POD)</button>
<button onclick="runReaction('urea')">Urea (Urease)</button>
<button onclick="runReaction('creatinine')">Creatinine (Jaffe)</button>
<button onclick="runReaction('cholesterol')">Cholesterol (CHOD-PAP)</button>
<button onclick="runReaction('bilirubin')">Bilirubin (Diazo)</button>

</div>

<div class="main">

<div class="beaker">
<div class="liquid" id="liquid"></div>
</div>

<div id="molecules"></div>

<div class="info" id="info">
Select a parameter to visualize biochemical reaction.
</div>

</div>
</div>

<script>

function clearBeaker(){
document.getElementById("liquid").style.height="0%";
document.getElementById("liquid").style.background="transparent";
document.getElementById("molecules").innerHTML="";
}

function addMolecule(text,left,top){
let m=document.createElement("div");
m.className="molecule";
m.style.left=left+"px";
m.style.top=top+"px";
m.innerHTML=text;
document.getElementById("molecules").appendChild(m);
}

function runReaction(type){

clearBeaker();

let liquid=document.getElementById("liquid");
let info=document.getElementById("info");

setTimeout(()=>{

if(type==="glucose"){

addMolecule("Glucose",120,420);
addMolecule("O₂",160,430);

setTimeout(()=>{
liquid.style.height="70%";
liquid.style.background="#ff4d6d";
addMolecule("H₂O₂",140,250);
addMolecule("Quinoneimine",150,210);
},1500);

info.innerHTML=`
<h3>Glucose – GOD-POD Method</h3>
<b>Substrate:</b> Glucose<br>
<b>Enzyme:</b> Glucose Oxidase, Peroxidase<br>
<b>Cofactor:</b> Oxygen<br>
<b>End Product:</b> Quinoneimine (Pink)<br><br>
<b>Reaction:</b><br>
Glucose + O₂ → Gluconic acid + H₂O₂<br>
H₂O₂ + Chromogen → Quinoneimine
`;
}

if(type==="urea"){

addMolecule("Urea",130,420);

setTimeout(()=>{
liquid.style.height="70%";
liquid.style.background="#4da6ff";
addMolecule("NH₃",140,250);
addMolecule("CO₂",170,230);
},1500);

info.innerHTML=`
<h3>Urea – Urease Method</h3>
<b>Substrate:</b> Urea<br>
<b>Enzyme:</b> Urease<br>
<b>Cofactor:</b> Water<br>
<b>End Product:</b> Ammonia + CO₂<br><br>
<b>Reaction:</b><br>
Urea + H₂O → 2NH₃ + CO₂
`;
}

if(type==="creatinine"){

addMolecule("Creatinine",130,420);

setTimeout(()=>{
liquid.style.height="70%";
liquid.style.background="#ff9933";
addMolecule("Orange Complex",140,220);
},1500);

info.innerHTML=`
<h3>Creatinine – Jaffe Reaction</h3>
<b>Substrate:</b> Creatinine<br>
<b>Reagent:</b> Alkaline Picrate<br>
<b>End Product:</b> Orange-red complex<br><br>
<b>Reaction:</b><br>
Creatinine + Picrate → Orange-red complex
`;
}

if(type==="cholesterol"){

addMolecule("Cholesterol",110,420);
addMolecule("O₂",160,430);

setTimeout(()=>{
liquid.style.height="70%";
liquid.style.background="#ff5c5c";
addMolecule("H₂O₂",140,250);
addMolecule("Red Quinoneimine",150,210);
},1500);

info.innerHTML=`
<h3>Cholesterol – CHOD-PAP</h3>
<b>Substrate:</b> Cholesterol<br>
<b>Enzyme:</b> Cholesterol Oxidase, Peroxidase<br>
<b>Cofactor:</b> Oxygen<br>
<b>End Product:</b> Quinoneimine (Red)<br><br>
<b>Reaction:</b><br>
Cholesterol + O₂ → H₂O₂ → Quinoneimine
`;
}

if(type==="bilirubin"){

addMolecule("Bilirubin",120,420);

setTimeout(()=>{
liquid.style.height="70%";
liquid.style.background="#ffcc00";
addMolecule("Azobilirubin",150,220);
},1500);

info.innerHTML=`
<h3>Bilirubin – Diazo Method</h3>
<b>Substrate:</b> Bilirubin<br>
<b>Reagent:</b> Diazo reagent<br>
<b>End Product:</b> Azobilirubin<br><br>
<b>Reaction:</b><br>
Bilirubin + Diazo → Azobilirubin
`;
}

},500);
}

</script>

</body>
</html>
