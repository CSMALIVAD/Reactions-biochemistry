<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champak's Virtual Laboratory</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#eef3f9;
}

header{
background:#001f4d;
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:600;
}

.container{
display:flex;
flex-wrap:wrap;
min-height:100vh;
}

.sidebar{
width:300px;
background:white;
padding:20px;
border-right:2px solid #ddd;
overflow-y:auto;
}

.sidebar button{
width:100%;
padding:7px;
margin-bottom:5px;
border:none;
background:#dbe7ff;
font-weight:600;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

.sidebar button:hover{
background:#bcd3ff;
}

.main{
flex:1;
padding:20px;
text-align:center;
}

/* Realistic Glass Beaker */

.beaker{
width:260px;
height:380px;
margin:20px auto;
position:relative;
border-radius:0 0 100px 100px;
border:6px solid #444;
background:linear-gradient(to right,
rgba(255,255,255,0.4),
rgba(255,255,255,0.1),
rgba(255,255,255,0.4));
overflow:hidden;
box-shadow:
inset 0 0 15px rgba(255,255,255,0.6),
0 5px 15px rgba(0,0,0,0.2);
}

.beaker::before{
content:"";
position:absolute;
left:15px;
top:0;
width:25px;
height:100%;
background:rgba(255,255,255,0.25);
border-radius:50px;
}

.liquid{
position:absolute;
bottom:0;
width:100%;
height:0%;
transition:height 1.5s, background 1s;
}

.molecule{
position:absolute;
color:white;
font-weight:bold;
font-size:13px;
opacity:0;
transition:opacity 1s;
}

.box{
margin-top:20px;
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:left;
font-size:14px;
}

@media(max-width:768px){
.container{flex-direction:column;}
.sidebar{width:100%; border-right:none; border-bottom:2px solid #ddd;}
}
</style>
</head>

<body>

<header>
Champak's Virtual Laboratory
</header>

<div class="container">

<div class="sidebar">

<button onclick="runReaction('glucose')">Glucose</button>
<button onclick="runReaction('urea')">Urea</button>
<button onclick="runReaction('creatinine')">Creatinine</button>
<button onclick="runReaction('cholesterol')">Cholesterol</button>
<button onclick="runReaction('bilirubin')">Bilirubin</button>
<button onclick="runReaction('alt')">ALT</button>
<button onclick="runReaction('ast')">AST</button>
<button onclick="runReaction('alp')">ALP</button>
<button onclick="runReaction('uric')">Uric Acid</button>
<button onclick="runReaction('amylase')">Serum Amylase</button>
<button onclick="runReaction('ckmb')">CK-MB</button>
<button onclick="runReaction('ldh')">LDH</button>
<button onclick="runReaction('protein')">Total Protein</button>
<button onclick="runReaction('albumin')">Albumin</button>
<button onclick="runReaction('calcium')">Calcium</button>
<button onclick="runReaction('phosphorus')">Phosphorus</button>

</div>

<div class="main">

<div class="beaker" id="beaker">
<div class="liquid" id="liquid"></div>
</div>

<div class="box" id="reactionBox">
Select a parameter to visualize reaction.
</div>

</div>
</div>

<script>

function clearBeaker(){
document.getElementById("beaker").innerHTML='<div class="liquid" id="liquid"></div>';
}

function addMolecule(text,left,top){
let m=document.createElement("div");
m.className="molecule";
m.style.left=left+"%";
m.style.top=top+"%";
m.innerText=text;
document.getElementById("beaker").appendChild(m);
setTimeout(()=>{m.style.opacity=1;},200);
}

function showReaction(color,substrate,product,equation,colorName){
let liquid=document.getElementById("liquid");
liquid.style.background=color;
liquid.style.height="70%";
addMolecule(substrate,35,80);
setTimeout(()=>{addMolecule(product,30,40);},2000);
document.getElementById("reactionBox").innerHTML=
equation+"<br><b>Real Laboratory Color:</b> "+colorName;
}

function runReaction(type){

clearBeaker();

setTimeout(()=>{

if(type==="glucose")
showReaction("linear-gradient(to top,#ff4d6d,#ff99aa)",
"Glucose","Quinoneimine",
"Glucose + O₂ → H₂O₂ → Quinoneimine",
"Pink");

if(type==="urea")
showReaction("linear-gradient(to top,#4da6ff,#a8d0ff)",
"Urea","Indophenol Blue",
"Urea → NH₃ → Indophenol",
"Blue");

if(type==="creatinine")
showReaction("linear-gradient(to top,#ff9933,#ffd1a3)",
"Creatinine","Orange Complex",
"Creatinine + Picrate → Complex",
"Orange-Red");

if(type==="cholesterol")
showReaction("linear-gradient(to top,#ff6666,#ff9999)",
"Cholesterol","Red Quinoneimine",
"Cholesterol → H₂O₂ → Quinoneimine",
"Red");

if(type==="bilirubin")
showReaction("linear-gradient(to top,#ffcc00,#fff0b3)",
"Bilirubin","Azobilirubin",
"Bilirubin + Diazo → Azobilirubin",
"Pink");

if(type==="alt")
showReaction("linear-gradient(to top,#99ffcc,#ccffdd)",
"Alanine","Pyruvate",
"Alanine + αKG → Pyruvate + Glutamate",
"Colorless / NADH monitored");

if(type==="ast")
showReaction("linear-gradient(to top,#ccff99,#e6ffcc)",
"Aspartate","Oxaloacetate",
"Aspartate + αKG → Oxaloacetate + Glutamate",
"Colorless / NADH monitored");

if(type==="alp")
showReaction("linear-gradient(to top,#ffff66,#ffffcc)",
"pNPP","p-Nitrophenol",
"pNPP → p-Nitrophenol",
"Yellow");

if(type==="uric")
showReaction("linear-gradient(to top,#ff9999,#ffcccc)",
"Uric Acid","Allantoin",
"Uric Acid → Allantoin + H₂O₂",
"Red");

if(type==="amylase")
showReaction("linear-gradient(to top,#fff176,#fff9c4)",
"CNPG₃","CNP",
"CNPG₃ → 2-Chloro-4-Nitrophenol",
"Yellow");

if(type==="ckmb")
showReaction("linear-gradient(to top,#ff6666,#ffcccc)",
"Creatine-P","ATP",
"Creatine-P + ADP → Creatine + ATP",
"Measured at 340 nm");

if(type==="ldh")
showReaction("linear-gradient(to top,#ccffcc,#eaffea)",
"Pyruvate","Lactate",
"Pyruvate + NADH → Lactate + NAD⁺",
"Decrease in NADH (340 nm)");

if(type==="protein")
showReaction("linear-gradient(to top,#8e44ad,#c39bd3)",
"Protein","Violet Complex",
"Protein + Cu²⁺ → Violet Complex",
"Violet");

if(type==="albumin")
showReaction("linear-gradient(to top,#2ecc71,#a9dfbf)",
"Albumin","Green Complex",
"Albumin + BCG → Complex",
"Green");

if(type==="calcium")
showReaction("linear-gradient(to top,#e74c3c,#f5b7b1)",
"Ca²⁺","Purple Complex",
"Ca²⁺ + OCPC → Complex",
"Purple");

if(type==="phosphorus")
showReaction("linear-gradient(to top,#3498db,#aed6f1)",
"Phosphate","Phosphomolybdate",
"Phosphate + Molybdate → Complex",
"Blue");

},300);
}

</script>

</body>
</html>
